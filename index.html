<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Titanium Barber - Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --gold: #d4af37; 
            --bg: #0a0a0a; 
            --card: #161616; 
            --blue: #007bff; 
            --text: #e0e0e0; 
            --success: #28a745; 
            --danger: #dc3545;
            --safe-bottom: env(safe-area-inset-bottom);
        }
        
        * { 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; 
            padding: 0;
            padding-bottom: calc(80px + var(--safe-bottom));
        }
        
        nav { 
            background: rgba(0,0,0,0.95); 
            padding: 12px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--gold); 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .logo { 
            color: var(--gold); 
            font-weight: 900; 
            letter-spacing: 1px;
            font-size: 1.1rem;
        }
        
        .nav-btn { 
            background: var(--gold); 
            border: none; 
            padding: 10px 16px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 800;
            font-size: 0.8rem;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }

        .container { 
            max-width: 100%; 
            margin: 0; 
            padding: 70px 12px 20px;
        }
        
        .view { display: none; }
        .active { display: block; }

        .card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid #333; 
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .card h2 {
            font-size: 1.3rem;
            margin: 0 0 20px 0;
        }
        
        .label { 
            color: var(--gold); 
            font-size: 12px; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin: 16px 0 8px; 
            display: block;
            letter-spacing: 0.5px;
        }
        
        input, select {
            width: 100%; 
            padding: 16px; 
            background: #222; 
            border: 2px solid #333; 
            color: #fff; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .service-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 4px 12px;
            margin: 0 -4px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .service-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .service-btn { 
            flex: 0 0 auto;
            min-width: 160px;
            background: #1a1a1a; 
            border: 2px solid #333; 
            color: white; 
            padding: 16px; 
            border-radius: 16px; 
            cursor: pointer; 
            text-align: center;
            scroll-snap-align: start;
            transition: all 0.2s;
        }
        
        .service-btn:active {
            transform: scale(0.95);
        }
        
        .service-btn.active { 
            border-color: var(--gold); 
            background: linear-gradient(135deg, rgba(212,175,55,0.2) 0%, rgba(212,175,55,0.05) 100%);
            box-shadow: 0 0 20px rgba(212,175,55,0.2);
        }
        
        .service-btn b { 
            display: block; 
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        
        .service-btn span {
            font-size: 0.85rem;
            color: #888;
        }

        .slot-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 8px; 
        }
        
        .slot { 
            background: #000; 
            border: 2px solid #222; 
            padding: 12px 4px; 
            text-align: center; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 13px;
            font-weight: 600;
            transition: all 0.15s;
            position: relative;
        }
        
        .slot:active {
            transform: scale(0.92);
        }
        
        .slot.selected { 
            background: var(--gold); 
            color: #000; 
            font-weight: 800;
            border-color: var(--gold);
            box-shadow: 0 4px 15px rgba(212,175,55,0.4);
        }
        
        .slot.busy {
            background: #2a1a1a;
            border-color: #442222;
            color: #664444;
            text-decoration: line-through;
            pointer-events: none;
        }
        
        .slot.blocked {
            background: #1a1a2e;
            border-color: #333355;
            color: #555577;
            pointer-events: none;
            font-size: 11px;
        }

        .btn-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            padding-bottom: calc(16px + var(--safe-bottom));
            background: linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,0.9) 100%);
            z-index: 999;
        }
        
        .btn-confirm { 
            width: 100%; 
            background: var(--gold); 
            color: #000; 
            border: none; 
            padding: 18px; 
            border-radius: 16px; 
            font-weight: 900; 
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 4px 20px rgba(212,175,55,0.3);
            transition: transform 0.1s;
        }
        
        .btn-confirm:active {
            transform: scale(0.98);
        }
        
        .btn-confirm:disabled {
            background: #333;
            color: #666;
            box-shadow: none;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .admin-header h3 {
            margin: 0;
            font-size: 1.1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: #1a1a1a;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
        }
        
        .stat-number {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--gold);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .day-group { 
            margin-bottom: 20px; 
            border: 1px solid #333; 
            border-radius: 16px; 
            overflow: hidden;
            background: var(--card);
        }
        
        .day-header { 
            background: linear-gradient(135deg, #222 0%, #1a1a1a 100%);
            padding: 14px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--gold);
        }
        
        .day-title { 
            color: var(--gold); 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 0.85rem;
        }
        
        .day-stats { 
            background: var(--gold); 
            color: black; 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 900;
        }

        .app-item { 
            background: #161616; 
            padding: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #222;
        }
        
        .app-item:last-child { border-bottom: none; }
        
        .app-info { flex: 1; }
        
        .app-time {
            font-size: 1.2rem;
            font-weight: 800;
            color: white;
        }
        
        .app-name {
            font-size: 0.95rem;
            margin-top: 2px;
        }
        
        .app-service {
            font-size: 0.8rem;
            color: #888;
            margin-top: 2px;
        }
        
        .app-price {
            color: var(--gold);
            font-weight: 900;
            font-size: 1.1rem;
            margin-right: 12px;
        }

        .btn-del { 
            background: var(--danger); 
            border: none; 
            color: white; 
            width: 36px;
            height: 36px;
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-del.blue { background: var(--blue); }

        .db-item { 
            background: #1a1a1a; 
            padding: 14px; 
            margin-bottom: 10px; 
            border-radius: 12px; 
            border: 1px solid #333;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        
        .db-item b { color: var(--gold); }
        
        .db-actions { display: flex; gap: 8px; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: flex-end;
            z-index: 2000;
            padding: 20px;
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal-content {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #444;
        }
        
        .modal-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .summary-box {
            background: rgba(212,175,55,0.1);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.95rem;
        }
        
        .summary-total {
            border-top: 1px solid var(--gold);
            margin-top: 12px;
            padding-top: 12px;
            font-weight: 800;
            font-size: 1.1rem;
        }
        
        .duration-hint {
            background: #1a1a1a;
            padding: 10px 14px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            border: 1px solid #333;
        }
        
        .duration-hint.active {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212,175,55,0.1);
        }

        .sync-status {
            position: fixed;
            top: 70px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--gold);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .sync-status.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="sync-status" id="syncStatus">⚡ Cloud Attivo</div>

<nav>
    <div class="logo">⚡ TITANIUM</div>
    <button class="nav-btn" id="toggleBtn" onclick="toggleView()">ADMIN</button>
</nav>

<div class="container">

    <div id="clientView" class="view active">
        <div class="card" style="margin-bottom: 100px;">
            <h2 style="text-align:center; color:var(--gold)">Prenota Ora</h2>
            
            <label class="label">Il tuo nome</label>
            <input type="text" id="custName" placeholder="Mario Rossi" autocomplete="name">
            
            <label class="label">Scegli il servizio</label>
            <div id="serviceGrid" class="service-scroll"></div>
            
            <div id="durationHint" class="duration-hint" style="display: none;">
                ⏱️ Durata: <span id="durationText">-</span>
            </div>
            
            <label class="label">Quando?</label>
            <input type="date" id="custDate" onchange="loadSlots()">
            
            <label class="label">Orario (slot ogni 15 min)</label>
            <div id="slotGrid" class="slot-grid"></div>
            
            <div id="summaryBox" class="summary-box" style="display: none;">
                <div class="summary-row">
                    <span>Servizio:</span>
                    <span id="sumService">-</span>
                </div>
                <div class="summary-row">
                    <span>Data:</span>
                    <span id="sumDate">-</span>
                </div>
                <div class="summary-row">
                    <span>Ora inizio:</span>
                    <span id="sumTime">-</span>
                </div>
                <div class="summary-row">
                    <span>Durata:</span>
                    <span id="sumDuration">-</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Totale:</span>
                    <span id="sumPrice" style="color: var(--gold);">€0</span>
                </div>
            </div>
        </div>
        
        <div style="height: 100px;"></div>
    </div>

    <div id="adminView" class="view">
        
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="statToday">0</div>
                <div class="stat-label">Clienti Oggi</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="statEarnings">€0</div>
                <div class="stat-label">Incasso Oggi</div>
            </div>
        </div>

        <div class="card">
            <div class="admin-header">
                <h3 style="color:var(--success)">📋 Servizi</h3>
                <button onclick="openServiceModal()" class="nav-btn" style="padding: 8px 14px; font-size: 0.75rem;">+ NUOVO</button>
            </div>
            <div id="dbList"></div>
        </div>

        <h3 style="color:var(--gold); margin: 24px 0 16px; font-size: 1.1rem;">📅 Prossimi Appuntamenti</h3>
        <div id="adminAgenda"></div>
        
        <div style="height: 40px;"></div>
    </div>

</div>

<div class="btn-container" id="confirmContainer">
    <button class="btn-confirm" id="confirmBtn" onclick="confirmApp()" disabled>
        Seleziona servizio e orario
    </button>
</div>

<div class="modal-overlay" id="serviceModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-title" style="color: var(--gold);">Gestisci Servizio</div>
        <input type="hidden" id="editId">
        <label class="label">Nome servizio</label>
        <input type="text" id="newSName" placeholder="es. Taglio + Barba">
        <div style="display:flex; gap:12px;">
            <div style="flex:1">
                <label class="label">Prezzo €</label>
                <input type="number" id="newSPrice" placeholder="25">
            </div>
            <div style="flex:1">
                <label class="label">Minuti</label>
                <input type="number" id="newSDuration" placeholder="30" step="15" min="15">
            </div>
        </div>
        <button class="btn-confirm" style="margin-top: 20px;" onclick="saveService()">💾 Salva Servizio</button>
        <button class="btn-confirm" style="background: #333; color: #888; margin-top: 10px;" onclick="closeModal()">Annulla</button>
    </div>
</div>

<script>
    // ==========================================
    // LA TUA CONFIGURAZIONE FIREBASE
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyANxYpIqye8gjCJdu-LboxX4OA6AB_0T8E",
        authDomain: "titanium-barber.firebaseapp.com",
        databaseURL: "https://titanium-barber-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "titanium-barber",
        storageBucket: "titanium-barber.firebasestorage.app",
        messagingSenderId: "1079095580108",
        appId: "1:1079095580108:web:32dace58ffbe72e75af969"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const servicesRef = database.ref('services');
    const appointmentsRef = database.ref('appointments');

    let services = [];
    let appointments = [];
    let selectedS = null;
    let selectedT = "";
    let isAdminMode = false;
    let currentDateFilter = null;

    document.getElementById('custDate').min = new Date().toISOString().split('T')[0];

    function timeToMinutes(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function minutesToTime(minutes) {
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
    }

    function showSync() {
        const status = document.getElementById('syncStatus');
        status.classList.add('show');
        setTimeout(() => status.classList.remove('show'), 2000);
    }

    // ==========================================
    // SINCRONIZZAZIONE FIREBASE
    // ==========================================
    
    servicesRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            services = Object.entries(data).map(([key, val]) => ({...val, firebaseKey: key}));
        } else {
            const defaultServices = {
                'serv1': { id: 1, name: 'Taglio', price: 20, duration: 30 },
                'serv2': { id: 2, name: 'Barba', price: 15, duration: 20 },
                'serv3': { id: 3, name: 'Taglio + Barba', price: 30, duration: 45 }
            };
            servicesRef.set(defaultServices);
            services = Object.entries(defaultServices).map(([key, val]) => ({...val, firebaseKey: key}));
        }
        renderServices();
        showSync();
    });

    appointmentsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        appointments = data ? Object.entries(data).map(([key, val]) => ({...val, firebaseKey: key})) : [];
        if (!isAdminMode && currentDateFilter) {
            loadSlots();
        }
        if (isAdminMode) {
            updateAdmin();
        }
        showSync();
    });

    function toggleView() {
        if(!isAdminMode) {
            let pass = prompt("Password Admin:");
            if(pass !== "1234") return;
        }
        isAdminMode = !isAdminMode;
        document.getElementById('clientView').classList.toggle('active');
        document.getElementById('adminView').classList.toggle('active');
        document.getElementById('toggleBtn').innerText = isAdminMode ? "CLIENTE" : "ADMIN";
        document.getElementById('confirmContainer').style.display = isAdminMode ? 'none' : 'block';
        if(isAdminMode) updateAdmin();
    }

    function renderServices() {
        const grid = document.getElementById('serviceGrid');
        const dbList = document.getElementById('dbList');
        grid.innerHTML = ""; 
        dbList.innerHTML = "";
        
        services.forEach(s => {
            let btn = document.createElement('div');
            btn.className = "service-btn";
            btn.innerHTML = `<b>${s.name}</b><span>€${s.price} • ${s.duration}min</span>`;
            btn.onclick = () => {
                document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); 
                selectedS = s; 
                
                document.getElementById('durationHint').style.display = 'block';
                document.getElementById('durationHint').classList.add('active');
                document.getElementById('durationText').textContent = `${s.duration} minuti (occupa ${s.duration / 15} slot)`;
                
                loadSlots();
            };
            grid.appendChild(btn);

            dbList.innerHTML += `
                <div class="db-item">
                    <div>
                        <b>${s.name}</b>
                        <div style="font-size: 0.85rem; color: #888; margin-top: 2px;">€${s.price} • ${s.duration}min</div>
                    </div>
                    <div class="db-actions">
                        <button class="btn-del blue" onclick="editService('${s.firebaseKey}')">✎</button>
                        <button class="btn-del" onclick="deleteService('${s.firebaseKey}')">🗑</button>
                    </div>
                </div>`;
        });
    }

    function openServiceModal() {
        document.getElementById('serviceModal').classList.add('active');
        document.getElementById('newSName').focus();
    }

    function closeModal(e) {
        if (!e || e.target === document.getElementById('serviceModal')) {
            document.getElementById('serviceModal').classList.remove('active');
            document.getElementById('editId').value = "";
            document.getElementById('newSName').value = "";
            document.getElementById('newSPrice').value = "";
            document.getElementById('newSDuration').value = "";
        }
    }

    function saveService() {
        const firebaseKey = document.getElementById('editId').value;
        const name = document.getElementById('newSName').value.trim();
        const price = parseInt(document.getElementById('newSPrice').value);
        const dur = parseInt(document.getElementById('newSDuration').value);
        
        if(!name || !price || !dur) {
            alert("Compila tutti i campi");
            return;
        }
        
        const roundedDur = Math.ceil(dur / 15) * 15;
        const newId = firebaseKey ? parseInt(firebaseKey.replace(/\D/g,'')) || Date.now() : Date.now();
        
        const serviceData = {
            id: newId,
            name: name,
            price: price,
            duration: roundedDur
        };
        
        if(firebaseKey) {
            servicesRef.child(firebaseKey).set(serviceData);
        } else {
            const newKey = 'serv' + Date.now();
            servicesRef.child(newKey).set(serviceData);
        }
        
        closeModal();
    }

    function editService(key) {
        let s = services.find(serv => serv.firebaseKey === key);
        if(!s) return;
        document.getElementById('editId').value = s.firebaseKey;
        document.getElementById('newSName').value = s.name;
        document.getElementById('newSPrice').value = s.price;
        document.getElementById('newSDuration').value = s.duration;
        openServiceModal();
    }

    function deleteService(key) {
        if(confirm("Eliminare questo servizio?")) {
            servicesRef.child(key).remove();
        }
    }

    function loadSlots() {
        const date = document.getElementById('custDate').value;
        const grid = document.getElementById('slotGrid');
        grid.innerHTML = ""; 
        currentDateFilter = date;
        
        if(!date || !selectedS) {
            updateSummary();
            return;
        }
        
        const slotDuration = 15;
        const start = 9 * 60;
        const end = 20 * 60;
        
        const dayApps = appointments.filter(a => a.date === date);
        const occupiedRanges = dayApps.map(a => ({
            start: a.minStart,
            end: a.minStart + a.duration
        }));
        
        for (let current = start; current < end; current += slotDuration) {
            const timeStr = minutesToTime(current);
            
            const isBusy = occupiedRanges.some(range => 
                current >= range.start && current < range.end
            );
            
            const serviceEnd = current + selectedS.duration;
            const hasSpace = !occupiedRanges.some(range => 
                (current < range.end && serviceEnd > range.start)
            );
            
            const div = document.createElement('div');
            div.className = "slot";
            div.innerText = timeStr;
            
            if (isBusy) {
                div.classList.add('busy');
                div.innerText = "×";
            } else if (!hasSpace) {
                div.classList.add('blocked');
                div.innerText = "•";
                div.title = "Spazio insufficiente";
            } else {
                div.onclick = () => {
                    document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                    div.classList.add('selected'); 
                    selectedT = timeStr;
                    updateSummary();
                };
            }
            
            grid.appendChild(div);
        }
        
        updateSummary();
    }

    function updateSummary() {
        const btn = document.getElementById('confirmBtn');
        const box = document.getElementById('summaryBox');
        
        if (selectedS && selectedT && document.getElementById('custDate').value) {
            document.getElementById('sumService').textContent = selectedS.name;
            document.getElementById('sumDate').textContent = new Date(document.getElementById('custDate').value).toLocaleDateString('it-IT', {weekday: 'short', day: 'numeric', month: 'short'});
            document.getElementById('sumTime').textContent = selectedT;
            document.getElementById('sumDuration').textContent = selectedS.duration + ' min';
            document.getElementById('sumPrice').textContent = '€' + selectedS.price;
            box.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '✓ CONFERMA PRENOTAZIONE';
        } else {
            box.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Seleziona servizio e orario';
        }
    }

    function confirmApp() {
        const name = document.getElementById('custName').value.trim();
        const date = document.getElementById('custDate').value;
        
        if(!name) {
            alert("Inserisci il tuo nome");
            document.getElementById('custName').focus();
            return;
        }
        
        const newAppKey = 'app' + Date.now();
        appointmentsRef.child(newAppKey).set({
            name: name, 
            date: date, 
            time: selectedT,
            duration: selectedS.duration, 
            price: selectedS.price, 
            service: selectedS.name,
            minStart: timeToMinutes(selectedT),
            createdAt: Date.now()
        });
        
        document.getElementById('custName').value = "";
        document.getElementById('custDate').value = "";
        selectedS = null;
        selectedT = "";
        document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('durationHint').style.display = 'none';
        document.getElementById('slotGrid').innerHTML = "";
        updateSummary();
        
        alert("✓ Prenotazione salvata su cloud!");
    }

    function updateAdmin() {
        const list = document.getElementById('adminAgenda');
        list.innerHTML = "";
        
        const today = new Date().toISOString().split('T')[0];
        const todayApps = appointments.filter(a => a.date === today);
        document.getElementById('statToday').textContent = todayApps.length;
        document.getElementById('statEarnings').textContent = '€' + todayApps.reduce((s,a) => s + a.price, 0);

        appointments.sort((a, b) => {
            if (a.date !== b.date) return new Date(a.date) - new Date(b.date);
            return a.minStart - b.minStart;
        });

        const grouped = appointments.reduce((groups, app) => {
            if (!groups[app.date]) groups[app.date] = [];
            groups[app.date].push(app);
            return groups;
        }, {});

        if (Object.keys(grouped).length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div>Nessun appuntamento</div>
                </div>`;
            return;
        }

        for (const date in grouped) {
            const dayApps = grouped[date];
            const dayTotal = dayApps.reduce((sum, a) => sum + a.price, 0);
            const isToday = date === today;
            
            let d = new Date(date);
            let dateString = d.toLocaleDateString('it-IT', { weekday: 'short', day: 'numeric', month: 'short' });
            if (isToday) dateString = "OGGI";

            let dayHtml = `
                <div class="day-group">
                    <div class="day-header">
                        <span class="day-title">${dateString}</span>
                        <span class="day-stats">${dayApps.length} clienti • €${dayTotal}</span>
                    </div>
            `;

            dayApps.forEach(a => {
                const endTime = minutesToTime(a.minStart + a.duration);
                dayHtml += `
                    <div class="app-item">
                        <div class="app-info">
                            <div class="app-time">${a.time} - ${endTime}</div>
                            <div class="app-name">${a.name}</div>
                            <div class="app-service">${a.service} (${a.duration}min)</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:12px;">
                            <span class="app-price">€${a.price}</span>
                            <button class="btn-del" onclick="deleteApp('${a.firebaseKey}')">×</button>
                        </div>
                    </div>
                `;
            });

            dayHtml += `</div>`;
            list.innerHTML += dayHtml;
        }
    }

    function deleteApp(key) {
        if(confirm("Eliminare questo appuntamento?")) { 
            appointmentsRef.child(key).remove();
        }
    }
</script>
